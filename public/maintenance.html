<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance | Angelo Brambilla</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f8fafc;
      color: #0f172a;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: #1e293b;
    }
    p {
      font-size: 1.125rem;
      color: #475569;
      max-w-xl;
      margin-bottom: 2rem;
    }
    .cv-button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background-color: #2563eb;
      color: white;
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      border-radius: 9999px;
      font-weight: 600;
      transition: background-color 0.2s;
    }
    .cv-button:hover {
      background-color: #1d4ed8;
    }
    .grid {
      display: flex;
      gap: 1rem;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #020617;
        color: #f8fafc;
      }
      h1 { color: #f1f5f9; }
      p { color: #94a3b8; }
    }
  </style>
</head>
<body>
  <h1>🛠️ Site Under Maintenance</h1>
  <p>I'm currently updating the portfolio with new features and information. This process usually takes just a few minutes.</p>
  <p>In the meantime, you can still download my CV below:</p>
  <div class="grid">
    <a href="/cv.pdf" class="cv-button" download>
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
      Download CV
    </a>
  </div>
</body>
</html>
